name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    # Build Server
    - name: Install server dependencies
      if: hashFiles('project/server/package.json') != '' || hashFiles('server/package.json') != ''
      run: |
        if [ -d "project/server" ]; then
          cd project/server
        elif [ -d "server" ]; then
          cd server
        fi
        npm install

    - name: Build server
      if: hashFiles('project/server/package.json') != '' || hashFiles('server/package.json') != ''
      continue-on-error: true
      run: |
        if [ -d "project/server" ]; then
          cd project/server
        elif [ -d "server" ]; then
          cd server
        fi
        npm run build --if-present

    # Build Client
    - name: Install client dependencies
      if: hashFiles('project/client/package.json') != '' || hashFiles('client/package.json') != ''
      run: |
        if [ -d "project/client" ]; then
          cd project/client
        elif [ -d "client" ]; then
          cd client
        fi
        npm install

    - name: Build client
      if: hashFiles('project/client/package.json') != '' || hashFiles('client/package.json') != ''
      run: |
        if [ -d "project/client" ]; then
          cd project/client
        elif [ -d "client" ]; then
          cd client
        fi
        npm run build

    - name: Test client
      if: hashFiles('project/client/package.json') != '' || hashFiles('client/package.json') != ''
      continue-on-error: true
      run: |
        if [ -d "project/client" ]; then
          cd project/client
        elif [ -d "client" ]; then
          cd client
        fi
        npm test -- --coverage --watchAll=false 2>/dev/null || echo "Tests not configured"

    # Upload artifacts
    - name: Upload client build artifacts
      if: hashFiles('project/client/build') != '' || hashFiles('client/build') != ''
      uses: actions/upload-artifact@v4
      with:
        name: client-build
        path: |
          project/client/build/
          client/build/
        if-no-files-found: ignore

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Snyk Security Scan
      uses: snyk/actions/node@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      continue-on-error: true
